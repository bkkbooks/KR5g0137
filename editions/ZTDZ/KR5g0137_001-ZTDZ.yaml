front:
  text: 洞眞太上八道命籍經卷上通九
  hash: sha256:80e00b93c37884678730bff1d453c4c9e2790d8dc8f645b2d3f3fd77bc8e0d73
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0137_SJB_001-330502a, image: sjb/33/330502a.png}
body:
  text: 解罪所用訣八道命籍一名八間一名八逹又名八解解纒釋結謝罪延福妙經太素三元君受於自然之章封於太上靈都紫房之内金章玉華三百人侍衛典香東海小童四極眞人西城王君封於峨嵋之山西室之中萬劫一傳有玄名帝簡紫字青宫玉藏之人千年之内聽得三傳上學之子不得此文虚困山林終不得道所謂八道者日月四時八節所行也日行赤道月行黄道黄赤二道隂陽之所常行至於立春春分月行青道二岀黄道東立夏夏至月行赤道二岀黄道南立秋秋分月行白道二出黄道西立冬冬至月行黒道二出黄道北此爲八道也月行八道之日各有變化翾飛蠕動含炁之流草木飛沉隨縁感應改故易新輕者更重重者更輕善惡廻換炁象之運自然而然上學眞人因變行化習吉除凶進吉黜惡申明棄闇入正治邪錬僞成眞厲愚登聖其法髙妙兹道玄通故曰八達至極无窮矣一道命籍立春清朝北望有紫緑白雲者是太上三元君三素飛雲也至存叩頭搏頰各九心禮四再拜宻呪曰曽孫姓名今日幸遇三元出行願得長生侍給輪轂餘所言隨人意也某病乞差某厄乞度某災乞消某事乞果三見雲輿白日昇仙不須復他存思千百所施爲行此必有仙録是故謂之八道命籍也二道命籍春分夜半子時東北望有玄青黄雲是太微天帝君三素雲也存禮宻呪皆如上法三道命籍立夏清旦西北望有紫青黄雲者是太極上眞君三元内宫眞人三素雲也存禮宻呪皆如上法四道命籍夏至清旦東南望有赤白青雲者是扶桑太帝君三素雲也存禮宻呪皆如上法五道命籍立秋清旦正西望有白赤紫雲者是太素眞人天皇白帝君三素雲也存禮宻呪皆如上法六道命籍秋分清旦南望有素赤黄雲者是南極上眞人上皇赤帝君三素雲也存禮宻呪皆如上法七道命籍立冬清旦西南望有緑紫青雲者是上清眞人帝君皇祖三素雲也存禮宻呪皆如上法八道命籍冬至清旦正東望有朱碧黄雲者是太霄玉妃太虚上眞人三素雲也存禮宻呪皆如上法右八道命籍之日日未至一二先沐浴燒香以待至日依時出望一食頃還室隂雨勿望非其日忽見此雲禮呪如上三倍勝於其日也凡先身今身前世今世罪結不除謾謝不的原恕賖遲功行難進魔試不知多致退落衰老易至求昇難期一去長逝幽苦未央上學之子悟此驚心誓志仰慕感玄徹靈能得命籍的斷罪根解釋惡結滋長善源羣邪敢干成眞必速諦念宻修即有驗矣凡諸解罪必先營齋克用八道之日身心清嚴自非同志不得妄叅大道聖眞神仙男女常㑹玄都長齋清集率心形以化億兆流行業以濟蒼生蒼生未嘗蹔无應化不得蹔闕應不蹔闕常有主應之方玉京之臺是常應之所生未甞无死死未甞不生出生入死无量无央天地无數國土无窮更生更死時刻无休起滅相渉有无互成生稱其有死目其无无不无有不有不有不无常應常在存而不滅智慧无窮上學之人相與歸赴赴之由階入之由炁思神録炁習法登階名之爲齋齋者齊也洗心淨身身心相應内外咸同精敬𠢫畟始終彌篤无有參差不怠不替无苟无矜恬惔至道故號曰齋齋法甚多不可具載聖眞相傳口口相教諸經有儀略舉梗㮣斟酌修用存乎其人學而不齋徒勞无獲如薪无火如火无傳如昇天无雲梯如飛歩无星炁雖自奮體豈能遂心心遂必由齋齋靜必謝過過不洗則福不來福不來則禍必至禍至不能禳无縁成仙聖聖仙長齋精思積久解謝衆愆斷凶納吉積福重徳德充入道與神合同常樂无苦有志期此擺撥諸塵誓營清齋用三元法法以守一爲主一以恬靜爲家家在人心宜和順順和之美人之所重至於習此弘之最難良由前後罪鄣纒結邪魔相干致招不易急應修齋三時六時大小懴願的之勝都辭㫖探此案次行之齋竟布施救厄扶危宻立隂功改心易行勤建陽德不犯所知知過勿復犯犯之即又謝三謝之後災消福至猶未如願精修勿怠果願成道乃可得休三犯之後不得復謝謝不被恕明各愼之受法之前有諸災厄苐一受法之後有諸災厄苐二出生以来有諸災厄苐三右三條災有多端厄有淺深不可具記大略標舉觸類附之先世今世前身今身雖有逺近罪目是同還随源解釋以功成德也出生富貴道俗兼修出處安隱吉樂相從或仕官爲業或商販爲資或田蠶爲事或漁獵爲常常業雖俗不滛不盜不昏不亂不妄相干父不哭子君不哭臣兄不哭弟師不哭資老者无病而終少者无患相奉送死接生弔凶慶吉此爲中平保之者希諸天著樂不復立功先福既盡尚入凶徒是故賢明願生下世隨師行道授受相成克獲神仙長生不死名爲上學業髙乎中中平可上乃得學上上學之方非凡下所議矣頻遭䘮亡一祖父師君傍親春屬年尊卑過非正災限已身慘服爲厄則同罪由不孝逆伐尊上自作勸他不知改悔解用金帛多買衆生飲飼放之各得其所連嬰疾病二生来多病一差一家人已身同入苐三條罪由不仁傷損含氣笑他疾厄呪𩓑令病解用酒藥夜置於都路市朝之間窮乏之處内外公家三雖非已過非横相牽貴賤男女親踈流連罪由不柔好闘勸訟制拘飛沉蘢繫生物觧用紙筆朱墨刀子手中逢人賜與不須說源大小口舌四道俗誹謗傳說盲書辯諍無實空中虛生罪由不受素薄親踈道說人惡負違諫諭解用飲飰羮臛鮭肴果菜設之要路不須看視出入逢賊五公私注来住止山世凶人侵迫掠奪毁傷罪由不慈略奪一切侵害人神肆欲利巳解用𤤽寳材竹瓦草土塼治護治館改易法物學業不昇六外習經史子集圖書内習真文方術要訣憎聞之求見不見之讀誦不通積年空過罪由不貞穢濁心身師友乖儀嫉他才學破易經文解用膏油及薪炭炬爥手寫經圖勸助同志右六件准三品九萬九千九百九過行之仕宦退落七爲君爲臣爲吏在位无能被廢或有中德横遭左遷歸里僻遐守盡窮困罪由不禮矯位詐威驕慢三朝凌按四野解用掃帚拂箕宻送他含晨夕掃路勿使人知無子多女八妻妾積年不䋥有子或有男則死有女則生罪由不順逆忤尊上斷人血嗣通同姦滛解用金銀珠玉投之流水祠无後親賢繼絶世道德傷胎失育九妻妾有胎傷動墮落㦯生旬日㦯至少年罪由不謹輕忽交㑹傷落他孕厭禱公私解用香油金如意几席祠簟送諸治舍男女媱妬十夫妻君妾交接无度空相疑妬内外不和罪由不貞素伉儷通他爭華在巳怒色在人解用五色之墨五綵之繒施於行路不問富貴貴賤凌辱十一帝王遭賊臣下遇盗道俗逢凶傷罵約路罪由不幹捨善從惡翻覆男女穢汚清淨解用香鑪奩盒銅鐵器物宻送山野助人婚嫁勸人齊集水火蟲鳥鬼衆災所侵害十二居止出入山水道路所養反變之災罪由不義形戮屠膾親君師尊内亂相威解用冠衣箱案刀匕投山水朝野路上右六件准三品三萬三千三百三過行之非意去失十三經書珍寳錢米布帛臣下奴婢无故去失罪由不嚴怠惰自適不耐他求𥨸人自益解用膠漆鎻鑰送治舍中酣酗忘誤十四讀誦言語忘前失後傳說僻謬罪由不愼愡同爲可誦習經戒忽略取過解用明鏡雜皮送治舍中居止偏僻十五中國陋巷邊城戎夷山水險阻罪由不斷謟佞自親已親損人舍宇解用刀斧鋸鑿鎚鑚釘挺布之行路作福得禍十六齋戒布施闘諍傷犯遭盗過患人鬼相加罪由不解違越三尊假託神鬼卜夢妄占解用金龍玉魚令形纒簡投之山水行善致惡十七吉意白彼彼以凶疑所勸成怨所以爲鄙嗤誚忿責結恨空深罪由不智以愚爲黠誹謗師道強名求譽觧用然燈十百千萬法數日數隨堪行之應成反敗十八道世所營造立建創公私計業推理必成爲人鬼所壞罪由不明動止閽滯自作苟爲毀他成事解用奴婢車馬牛船燈纂主盛給治中右六件准三品七萬七千七百七過行之巳得又失十九道世所求公私所作出入所見巳得分明俄頃或經時遂不覺處所罪由不清濫受諸物誘匿姦私施惠追咎解用身所服玩布施行途逢人即與勿問有无爲人所嫉二十有才有德得位得財人物所附而有嫉憎罪由不平阿黨任意好勝干衆抑絶賢明解用履板牀悵供諸有道識與不識遇之則與爲人所疑二十一道德名位日進日新或藏明晦迹或寳巳守常人横疑猜忌罪由不忠欺罔幽顯萬端負誓誤敗良善解用淨甖與盤櫛沐浴具送治中爲鬼所著二十二忽見鬼來男女和合或罵詈穢醜不自覺知罪由不信嗊嗃詐僞滛祀亂真驚恐百姓解用桃奏符板削治淨潔薦蓆真朱送治中爲邪所通二十三平常忽異或因疾苦所見驚憂所解求真發作无損邪弊日增罪由不正恊道營俗男女混雜迷亂天人解用經臺堂室牀帳机案巾㡌厨箱送治中被試不度二十四師友魔王公私非意所未甞經是所宜棄今皆善之並動心識罪由不專習學泛濫望速厭遲泄露寳訣解用捨身給師驅使次造治館躬執香燈掃洒盡其心力教化立於後生右六件准三品三萬三千三百三過行之凡有四六件合二十四事三八在乎其中包羅衆條大小疑似是非紛紜思議附此注正分明依源齋謝解而釋之所輸所散洗竭至誠无悔无吝大福即臻非用金帛當運心形計力量工筭日准直能輸不計皆得由人人不堪者或有貧富制以取中要在无惜惜即又首三首无原也東海青童君告方諸眞人曰子之應感行化羣生凡有志向宜須獎成傳付此訣宻重丁寜前代已過今不具陳即日自改准此爲科齋謝之後小災即消大災未釋當急避之避之所徃依案渾儀仰觀俯察精宻勿宣且如天文說大災必除除災招福先由此經此經要法内外所珍衆聖所貴流芳无窮矣二王君至祕此魏華存受㫖行之有驗後傳獨立又隱此文修之者寡成眞者踈玄名圖録必得之耳上爲國師中爲民間師下學修身末爲人師此爲三品也洞眞太上八道命籍經卷上
