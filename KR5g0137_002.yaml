既重今愆又增懼殞漏刻微願不申今幸蒙大慈賜加善貸誓及寸隂庶立丹志依法奉辭謹讀以聞辭本如前辭情欵到仰希哀矜賜以三宥之澤原赦臣妾等前世今世先身今身及七玄七祖中外種親君臣師友一切因緣前亡後死見在世間有隂陽重罪生諸災害學宦不逹所願不成今洗心歸命散髮頓頭特願三尊涕然垂亮勑勒所由班下正職拘除臣某等及上世因緣幽顯動止違逆之愆或不慈不孝不仁不明不恭不遜不信不忠不嚴不斷不讓不廉不施不救不清不平不正不通不勤不順或手害人命劫賊攻略謀圖姦淫九族交接或教人殺戮酷虐衆生劫略謀圖姦通九族嫉賢妬能伐逆師主或受經泄露輕慢寶章或染法混俗哭泣臨尸履冒血穢不自改悛或行用寶訣帶近女人隂隂雜亂不遵七經或叨參三洞不除三尸心懷隂賊手肆頑凶嗊嗃自專傷毀同氣破賊經誥違負三尊或便旋興居不顧禁忌公知故犯私欲乖科飽食醉酒作性異常虧道壞法協邪疑真或不師受竊經輒傳不齋告盟率爾交換假借施行欺侮百姓改易聖文意通玄妙廢古競今自作一法或奉道不精經無堂室供養不具朝禮頓替異人婦女共處往來服飾交關非類相會或處髙位尊上師君輕蔑自下殺害無辜賞罰不平取與無定任愚恣欲觸犯三光或為臣子吏民㒒𨽻出入欺罔𥨸濫縱橫弒逆反倒千忤五行或男女翻覆妬害公私棄正逐邪誹謗真道知惡不悔悔又重犯積結未解悉乞蕩除解罪布福和釋怨仇消滅注訟杜絶惡源先亡眷屬同免幽泉俱升光景利祐後人善神擁護扶助存亡令死者輪轉與道結緣生者學業功行惟新墳墓安穩宅舍清寧家國興隆道化日盛群魔降伏衆聖來遊二儀交泰三光同明七曜無舛九皇調均四海停波五嶽秀峰風雨普適穀稼豐盈一切荷慶天下太平特願玄慈賜如所請蒙恩果願不廢今言上明大道更造之施下副臣妾等渴仰之誠大懴竟向東叩齒三十六通讀五願此别有五日三齊自得通用第一上願我生自然之氣氣中結成我身身與三光齊倫長享無極之根二願我身常處太空之上瓊宫玉房之裏朝與玉帝同宴夕與玄母同遊渴吸浪井洪泉玉芝飢納龍胎瓊油絳樹赤子三願我身身生萬怪七十二光竒毛異質飛羽衣裳乘虛駕空出入帝宫衆慶來臻萬夀無量四願與氣俱生與氣俱死死而又生生為帝王封掌十天總領羣仙五願一切衆生巳生未生同保日月三光有道之人七玄之祖上升南宫天下之福靡有不當四方五願並會玉堂次上願九玄扶養我身魂魄真神常居我宫上通天仙下逮洞淵願地願風願雲願神五願一合定籍長生天降紫煙地衛五靈乘雲駕虛飛輦緑軿上造金闕進登玉清慶及七祖更受胎生上願五合長亨利貞中願亦五得道本根願隂願陽願太空願太無願太玄上宴玉房與帝因緣遊盻生關披浪九天元父定籍玄母記年桃康結精固保丹田身騰金剛名書玉篇七祖解脫福慶來臻下願亦五願太虛願太有願太上願太真願神仙運身於五嶽之嶺飄颻九霄之際出入開關之裏移脫死戶之外願天地為我父母三光衛我年萬神守九泉之孔靈降自然之氣以方五願舉響而會願畢叩齒二七呪曰太帝上元帝一玄經五雲散景鬱徹三清玉童玉女燒香侍靈上願開陳與我合并使我神仙上升帝庭北帝落死南關注生東華金格得上我名無窮之願與我齊并畢又叩齒三七仰咽氣五過止呪畢三捻香復爐曰三元三天五嶽五帝神仙使者三氣正真左右龍虎天仙地仙飛仙神仙五靈香官當令招致十方正氣自然金液丹精芝英九玄玉真交會齋堂露墠靈壇洞灌臣某等身中使臣某等學道得道求仙得仙飛行太空騰景九天玉童玉女侍衛香煙奏臣某等所啓上御髙上無極太上大道玉皇帝几前畢叩齒九通咽液九過都止復爐仍回巡出時行詠如左右六篇六時各誦一若三時迭互周而復始詠畢出呪嗽悉如朝儀食後上經講至戶亦嗽口叩齒三通存神如法心禮三拜密呪曰玉帝上法上聞三清吉日齋戒開我神經萬試隱伏所向皆成玉童侍護玉華散馨上生三元與我長生開經亦用入堂向道禮三拜若人衆可巡行至東若定位俱三拜亦可一拜亦可心拜拜畢正坐坐定閉目握固叩齒存頭正青如碧玉兩手如丹兩腳如雪魂備左魄守右良久開目挼掌案摩上坐存畢上髙座誦經講義先向道座禮九三一拜登髙座開經時先叩齒三十六通咽液三十六存回風混合帝一百神萬真仍密呪曰微微玄宗門煥玄徹空洞至道由靜默當見三素宫大道於此成驂景乘雲龍左右侍經人玉女及玉童身濟不死津解羅順靈風七祖反胎生世為神仙宗讀三十九章雌一大有九真太丹北向心禮四方叩齒三十六咽液三十六存五藏之內有五色之光注五星之精然後讀神州次百神內名乃誦三十九章心目相應不得雜想令篇句畢了不得中住讀三十一卷北向心拜四方叩齒二十四咽液三十四存五星日月三精玄注兆身餘卷依别訣讀智慧經及偈讃先閉目叩齒三咽液三存三素元君在金華宫如嬰兒狀而詠文也讀經講義畢俱下正立禮三尊三拜拜竟同伏叩齒三密祝曰陵梵履昌七靈丈人太一務猶五神黃寧上升九天與帝共并乞願飛仙七祖胎嬰解愆釋羅上登玉清畢又叩齒七通咽液三過止起出戶存神晨夕常耳七年上升日夜三時六時存呪皆同入壇墠者呪中小異言堂室處易云壇墠耳壇墠堂室內外皆三重上座大法法師入內次下座住中次對齋住外堂壇之燈七九之外隨宜燃之大略依上元九十中元六十下元三十六合一百八十六羅列堂壇左右門閣太歲月建日辰本命行年之上太歲本命晝夜常明餘唯夜朗若雨於堂然二燈餘者可門行道畢各向本命及太歲燈再拜啓乞求願隨意所言又依四極明科立春春分九燈列庭中立夏夏至八立秋秋分六立冬冬至五本命十二燈八節向王本命向太歲叩齒二十四呪曰髙上太真萬聖五帝皇帝玉司總仙監真今日吉晨八節開陳陽罪隂考絶滅九隂於今永始拔擢七玄免脫火鄉長離刀山三塗五苦不纍我身得同天地克保帝晨五願八會靡不如言畢解巾叩頭一百二十下額向地而巳勿令痛竟復巾仰天心念我身今日上享天恩賜反形骸更生飛仙畢仰咽二十四氣止三年愆除身與真同耳壇墠四方合一百八十六燈九丈者方各一百八十六合六百四十四也此外千八百六十燈門庭巷路侍之至曉風雨則停日限竟止都竟言功齋竟之朝行道之後未可復爐仍唱各稱名位某位凡所受道髙卑依次言之極大法者一如黃素若參師籙治歷稱在前上啓三元太真洞空九玄太虛髙上玉皇三十九帝二十四真髙聖玉晨太上大道君四司五帝萬道元始上聖至極天尊臣等好道樂仙志願騰景九玄上謁上真以某月某日時於某處開啓齋直行道誦經思神念真合藥精思謝罪立功洗心竭力遵法依科修行事竟日限訖今所啓上請髙上三元三清三寶領仙侍郎五方五帝監靈大夫典齋使者飛仙天仙地仙神仙五嶽四瀆四方監察真官靈仙謁還真宫進品上仙加爵帝秩隨品署真當如太真之儀令臣某等九玄七祖中外先亡同免幽夜俱入光明宿罪解釋福德興隆臣某等行道得道求仙得仙作丹成丹作金成金精思感通神明交遊謝罪罪釋祈福福臻分形變化七十四方三元下降降致緑軿飛行上清騰景九天日月同輝三寶齊輪惟蒙至上鑒映丹情臣某等學法未僃俯仰之格齋法難精多違妙軌不合典式進止犯科為四司所紏五帝所執千愆萬罪特希赦宥哀原未悟愚昧不及矜奬善心不賜譴罰臣某五體真官隨尋仙職上詣玄都依品受秩班賞事竟還臣某等身中與臣某等同科升飛行太空謹以啓聞伏須告報臣某等誠惶誠恐稽首再拜以聞畢再拜又三捻香復爐出詠呪漱如常凡所送之物所作之事皆用正齋之日隨便施行若風雨阻異可至齋後不得過九日過此更齋首謝愆深所為未遂今更啓告乞果素心齋中吉凶公私觸忤不終齋事後皆更營十之百之得應乃止凡四時之日數不可過復不得減事悉取周若計用功夫身力不贍當貨賣借人相助為之所賦諸物分人廣布必是同志勿使雜人或所住幽僻去邑道遐皆嚴裝船車辦強事計力齋日限成就工夫不得逋違遷延日月忽遇窘迫忘失前為為福得禍明各慎之凡所辦法物未得輸送非意去失水火盜賊魔鬼竊藏醜類穢汚皆應委捨啓告燌埋不得供他凡猥之用悉更新辦依法勿𧇊亦應别辭啓告首謝凡有數種災罪或備有二十四條皆不得一時并解當三年取周三年二十四節不可𧇊一𧇊一更始此甚為難非精志者莫能辦之辦之不辦皆不得道將來之緣不副今日今日之䫁當勤精密營念不忘無不果者其中數災數厄數罪相關共在六條者一時并解六條不必六時時解一事也三年之後未得感通乃可一時一事的的解之積年周竟必獲上升也洞真太上八道命籍經卷下
