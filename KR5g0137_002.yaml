body:
  text: 洞真太上八道命籍經卷下通十太上大道氣周十方人之動靜在八而已四面四維隸上屬下下方上方攝統乎八八卦正神施行八氣太一為主三元流通流通人間間中有路路通善人有玉簡者習向逍遙出乎八門導逹遊宴適乎十方十方聖衆皆從八門得出八道命籍悉載衆聖所行行化濟善日陽月隂隂德隱通通神妙訣聖真所祕齋禁彌嚴未能解罪不得見聞聞見不解解亦不行行亦不驗徒勞增愆若有至誠精思玄感必能解罪必見此經必曉此事必獲重福遵修即驗克成真矣的謝齋法法身獨修若有同志二人三人乃至九人不得過也脫善緣運會偶多賢明九人之外别更結齋慎勿強共干忤九天求福得禍明各慎之凡師犮疾厄不堪躬齋同學志人可得相為獨及有侣亦極九人法師都講監齋侍經侍香侍燈執簡如法的行八道四時六事八節五行二十四氣信德土功周遍內外是故旡復四季之齋也凡相為的齋悉不得受嚫主人所用精案四科的謝齋竟四科所輸默而施行勿使他覺有相問者方便答之偶有布施或云奉上彼苦不受勿強致猜更復與他他會受者不須語人道彼受不受也的謝齋法通用三元日數則異春九夏三秋七冬五日夜行道六時三時朝朝中乾菜果實隨人未至數日掃灑內外整理法物逆辨精新不得臨時率爾充限禁隔唯嚴不得囂雜營齋之身不得出外出外勿還還則别住慎勿冒前誤至齋所外來信使住門傳言內人譯語先水吩嗽去又嗽之不得忽略施安壇墠堂房牀帳几案香具薦席井幃步障幔幕淨潔密完厨帳井竈浴室及圊厠皆當燒諸名香勿令臰氣發泄猥人住處各立圊厠坐卧解脫不得相涉髙卑混同俱被災考防禍求福明加慎之齋集之夕或食或不食漿藥各異沐浴當同雖久長齋亦宜沐浴消息治辭人定啓告清嚴入室依常朝儀至大懴讀文有侣者唱稱名位法師叩齒三十六通長跪執文如左太玄都三洞法師某嶽先生小兆真人三景弟子奉行大洞經事若不受三洞直云太上玄都玉京紫宫瓊房三景弟子大洞法師小兆真人某嶽先生夫人元君臣妾姓名上啓太上無極大道三元太真皇老髙上仙都髙皇玉帝九玄道君無極天尊無上洞玄自然虛皇五方五帝五嶽飛仙玉司金闕一切諸靈官臣某下愚謬叨上道誠歡誠荷載惕載慙未能專習妙法速登神仙推遷世途咎舋消積日月易去年命難留常恐奄忽一往無還自驚自悲痛切心腑仰怙玄慈賜垂哀祐今在驅除之運幸見不死之方久忘罪穢之躬誓慕長生之術伏覽八道命籍八逹要文仰瞻三素存禮八尊的謝齋法解釋罪纒前後殃散克獲神仙不揆行尺誓願修習若為人云今有師犮尊上君親子弟男女某同受此法某今疾厄公私迫礙不得躬修因臣妾等啓告注心如科臣妾等道同志合冒操某辭謹讀以聞依科供辦密遵要言洗心齎辭謹讀以聞某州某郡鄉里男女官祭酒道士某洞弟子臣妾姓名年如干歲户口如干今住某處某稽顙謝罪乞恩辭共辭者具鄉居位姓名臣某凡賤下愚草土苖裔幸籍善緣叨染妙法銜荷玄恩實深罔極但生長流俗習惡移辰動靜成愆日夜增積雖奉經戒不能修行出入災毒之世遭逢驅除之期由是懼充韲粉俯仰驚悲雀鼠貪生蜫葦願活不揆罪穢之餘冒樂升進之澤某年月日時於某處詣男女法師姓名受某經戒要方妙術寶訣祕文如千卷如千帙或某年太歲某某月日時於某處某因緣得如干卷某年月日時於某處玄盟誠歡誠喜誓志遵行冀申素願某月日時於某處忽得某疾病公私災厄隨意言之憂怖屏營慮不全濟或出生多病貧窮困苦少孤長獨天人罕此某事云云良由宿舋既深今愆又重致此凶災慙懼敢怨伏尋罪躬分當甘殞豈宜叨忤冒昧上聞但仰怙玄慈含弘塵垢善貸善成不遺毫分謹洗心清身齋戒首謝乞更造之恩賜三宥之渥消災瘵疾官事解釋依原消息年命申延誓不言犯展得自新修行所受克獲神仙道種之限蒙如今請銘荷曲成之恩謹辭某號某年太歲某某月朔某日子某時於某州郡縣鄉里山館奉辭情慊𣢾特乞恩矜賜如所請賜允所祈原罪降福道德興𨺚功業成就必獲神仙謹習誦戒律遵行祕言千魔降伏萬神衛門九真使者傳説所陳徑御九玄玉帝几前明晨行道續復上聞啓畢起巡行誦智慧三首畢向北心禮十方竟巡行至東向西説七報七傷誦觀身大戒未能諳者執文讀之七報如左真人曰負隂抱陽因緣各異捨死得生果報不同為善善至為惡惡來如影隨形毫分無謬善惡多端福報難數大而言之其標有七一者先身施功布德救度一切今身所行與先不異必得化生福堂超過八難受人之慶天報自然二者先身好學志念神仙崇奉玄科敬信靈文念善改惡立行入真今身所行與先不異得接帝皇名書紫簡上升玉晨三者先身樂道不憚苦寒隨師執役唯勞為先飢渴務效不生怨言今身所行與先不異得䇿飛軿遊宴五嶽乘虛落煙四者先身貞潔不淫不姦不貪不欲見色無歡心如死灰執固道源今身所行與先不異得報靈人超度三塗五苦不經五者先身施善願天普𨺚同得升度去離八難衆身不過已身不安割已之服以拯窮寒損糧餉鳥遺物空山今身所行與先不異四司稱善感徹玉皇書名紫簡禮補上仙六者先身忠孝恭奉尊親崇敬勝已宗禮師君腹目相和如同一身心無嫉妬口無輕言內外齊并動止合真今身所行與先不異得受靈人不經三塗超過八難善善相注福福相因如此之報道豈負人七者生世不良懷惡抱姦攻伐師本訾毀聖文不崇靈章疑二天真外形浮好假求華榮口是心非行負道源竊盜經書不盟而宣泄露祕訣流放非真今身所行與先不異違科犯忌身入罪源七祖橫罹責及窮魂身死負掠食火踐山三塗五苦萬劫不原楚撻幽夜痛切其身夫欲修學熟尋此文改惡行善速登神仙七傷如左真人曰學貴六合宜慎七傷第一之傷帶真行偽淫色喪神魂液泄漏精光枯乾氣散魄零骨空形振神泣窮府上聞天關真仙逺逝則與凡塵結因土府同符豈復得仙第二之傷外形在道皮好念真而心抱隂賊凶惡內臻願人破敗嫉能妬賢口美心逆面歡內嗔形論得失妄造罪原毀謗同學攻伐師根三官所記摽為惡門仙真髙逝邪魔攻身走作形景飛散體神故令枉橫極其惡源考滿形灰滅已九泉圖有玄名豈保自然第三之傷飲酒洞醉損氣喪靈五府攻潰萬神振驚魂魄飛散內外朽零本室空索赤子悲鳴真仙髙逝邪魔入形如此之學徒損精誠雖有玄記空失玉名神升上宫身灰幽冥恍惚延年焉得久停第四之傷行不敬物責人宗匠心忿口形罵詈無常嗔喜失節意性乖常氣激神散內真飛揚魄離魂逝九孔塵埃五府奔喪皆由性之不純行之不祥真仙髙逝外痾入形如此之學將欲何蒙雖有玄圖不免斯殃望仙日悠地理日長第五之傷或玄圖表見得受寶經或運值靈師啓授神文而不依科盟形泄天真未經九年投剌名山使青宫有録金闕結篇便傳於人流散世間輕真泄寶考結已身徒有玄名反纍七玄仙道髙逝身死幽泉長充鬼責萬劫不原第六之傷身履淹精靈關失光五神飛散赤子騫揚邪魔來攻內外交喪如此之學望成反傷真仙髙逝空景獨行淪於混濁仙胡可蒙第七之傷啖食六畜之肉殺害足口之美臭氣充於藏府伐生刑於非巳真氣擾於靈門遊神駭於赤子魂魄遊於宫宅濁滯纒於口齒仙真髙登於玉清已身沉頓於地里徒有玄名帝簡亦不免於必死髙聖帝君曰為學之本當以七傷為急既得瞻盻洞門披覩玉篇不犯七傷之禁捋坐待靈降白日升晨如外勤存學內不遣於七傷者此將望成而反敗期生而反亡希吉而反凶求飛而反沉靈仙遊於髙清五神散於八荒赤子號泣於中宅遊魂悲鳴於玄空故仙相有成敗上學有七傷篤尚之士熟精其真諸有神挺應圖瓊胎紫虛名題東華得見七傷檢文自無此挺靈篇不可得而妄披寶文不可得而輒看見此文者玄質合仙九年修行克得飛行玄虛上升玉清誦戒從苐五始為第至後還前取第一周第四訖不須讀前後序説文多不重書臨時讀别卷誦戒畢起向前燈叩齒三通密呪明燈頌三首太上散十方華燈通精誠諸天皆赫然諸地悉朗明我身亦光徹五藏生華榮炎景照太無遐想繄玉清丹精寄太無玄陽空中響含形滅苦根幽妙至真想垂華不現實因緣示光象我身亦如之乘化託流景夜光表陽丹苕苕照靈室諸燈普光顯諸隂即巳滅我神亦聰明常玩智與慧逍遙適道運遷謝任天勢舉形躡空洞夜燭煥流華呪竟還西向東復爐出誦呪嗽還房動止皆如朝儀明旦丑時同起清嚴寅時登臺至户嗽呪存師亦如朝儀凡不師世師啓告玄盟者存玄師青童君在方諸宫願賜降現㖟訣長生神仙速就宣化無窮存師竟仍臨目叩齒三十六通呪曰北帝大魔王受事帝君前泉曲之鬼四明酆山千妖混形九首同身神虎放毒馘滅雷震真音神公吐呪所戮無親太微有命攝録山川鳴鈴交擲流煥九天風火征伐神鋒十陳凶試伏滅萬精梟殘妖毒敢起受閉三關請依洞法莫不如言畢又叩齒三十六發爐别叩齒也發爐竟向北長跪亦可小坐叩齒三十六通出官謹出臣妾某等身中四肢五體玉門紫閣三十九户上真靈官左右飛仙玉虛侍郎五帝五色元皇太真飛龍功曹神仙使者各三十六人玉虛侍郎執飛仙羽節九色耀天之麾五帝五色元皇太真手執五帝命魔靈幡飛龍功曹冠帶羽服金真鳯章神仙使者交繞七元擎持玉案對立臣妾等前銜臣妾等口中祕言乘金根紫蓋丹轅瓊輿飛雲之輪從金仙玉童太華玉女各十二人左右龍虎騰天羽騎二十四萬衆飛行紫虛上登九天之上金闕玉殿瓊房丹室之內上啓上上無極無窮至上洞真九玄元父太虛玄母元始天王髙上玉虛萬道丈人欎單無量天王上上禪善無量夀天王須延天王寂然天王不驕樂天王化應聲天王梵寶天王梵迦摩夷天王波梨答惒天王七十四天帝三十六天王三十六土皇萬始先生三天玉童九天丞相太真王髙上三十九帝二十四玉皇玄古先生萬始丈人髙上玉晨太上大道君後聖金闕帝君扶桑暘谷神王四司五帝南極上元禁君西臺龜母上清太真玉保王上相大司命髙晨師東海玉門青華小童君泰清玄元上三天無極大道太上老君太上丈人天帝君九天仙都君九氣丈人等百千萬重道氣千二百官君泰清玉陛下太極四真無鞅數道上皇真人無極天尊氣係自然玄都元皇大洞三景弟子小兆真人某嶽先生夫人元君臣妾等本生胎穢遭遇靈運因緣福慶輪轉法門得生人道忝蒙髙虛餘光曲映啓悟愚矇得以臭質仰披聖文法師道士男女真人姓名以某年月日時於某處授臣妾某髙玄九天龍書鳯章太上玉簡三清寶文如千卷如千符如千訣或先人某承受某師上清寶經世世相傳或因緣所遇某年月日時於某處所得供養研尋周覽反覆咨請師尊解釋疑滯或即年尋師不能相值某年月日時某處玄盟誓願遵修以果心願但生長五濁而叨慕三清身染穢纍日月遷延未能騰景浮輪九玄沉淪下世業行多違戒律𧇊替舉止罹愆四司所執結罪科門敢緣聖典盟授齋文太真三元要訣三品上應九玄合丹鎮生中應六合以解巳身犯科違戒宿結之愆下應三才拔度七祖釋九隂之責上死魂生天此髙上妙法求仙之本根臣某等貪道樂真志願修行某或誦經戒或合丹精今未合者云比欲經營藥物神仙要方合和神丹或禁九散酒餌自慮無始中來因緣粗淺今功尚薄合和不成又恐宿新動止破戒違經幽顯罪鄣日結日纒未能解釋善志弗申又懼億曽萬祖七世父母生平釁重沉淪